<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#243347"/>
      <stop offset="100%" stop-color="#141f2b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Dividers -->
  <rect x="254" y="72" width="4" height="368" rx="2" fill="white" fill-opacity="0.07"/>
  <rect x="72" y="254" width="368" height="4" rx="2" fill="white" fill-opacity="0.07"/>

  <!-- + (top-left, center 128 128) -->
  <rect x="84" y="119" width="88" height="18" rx="9" fill="white"/>
  <rect x="119" y="84" width="18" height="88" rx="9" fill="white"/>

  <!-- − (top-right, center 384 128) -->
  <rect x="340" y="119" width="88" height="18" rx="9" fill="white"/>

  <!-- × (bottom-left, center 128 384) -->
  <rect x="84" y="375" width="88" height="18" rx="9" fill="white" transform="rotate(45 128 384)"/>
  <rect x="84" y="375" width="88" height="18" rx="9" fill="white" transform="rotate(-45 128 384)"/>

  <!-- ÷ (bottom-right, center 384 384) -->
  <circle cx="384" cy="349" r="11" fill="white"/>
  <rect x="340" y="375" width="88" height="18" rx="9" fill="white"/>
  <circle cx="384" cy="419" r="11" fill="white"/>
</svg>
